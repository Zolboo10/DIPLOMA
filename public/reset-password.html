<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нууц үг шинэчлэх | Монголоор аялахуй</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="login-right">
                <div class="login-header">
                    <h2>Нууц үг шинэчлэх</h2>
                </div>

                <form id="reset-password-form" class="login-form">
                    <div class="form-group">
                        <input type="password" id="new-password" placeholder="Шинэ нууц үг">
                    </div>

                    <div class="form-group">
                        <input type="password" id="confirm-password" placeholder="Шинэ нууц үг давтах">
                    </div>

                    <button type="submit" class="btn-login">
                        Шинэчлэх
                    </button>
                </form>

                <div class="register-link-bottom">
                    <a href="login.html">Нэвтрэх хуудас руу буцах</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-notification" class="toast-notification"></div>

    <script>
        const API_URL = 'http://127.0.0.1:5000/api';

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast-notification');
            toast.textContent = message;
            toast.className = `toast-notification ${type}`;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!token) {
                showToast('Token олдсонгүй', 'error');
                return;
            }

            if (!password || !confirmPassword) {
                showToast('Нууц үгээ бүтэн оруулна уу', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Нууц үг таарахгүй байна', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showToast(data.message || 'Алдаа гарлаа', 'error');
                    return;
                }

                showToast('Нууц үг амжилттай шинэчлэгдлээ', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                console.error(error);
                showToast('Серверт холбогдоход алдаа гарлаа', 'error');
            }
        });
    </script>
</body>
</html>
